<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cart | PrintForge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <nav class="nav" data-nav></nav>
  <header class="page-hero"><div class="container"><p class="eyebrow">Cart</p><h1>Your selected 3D prints.</h1></div></header>
  <main class="section">
    <div class="container cart-layout">
      <section data-cart-lines></section>
      <aside class="checkout-box sticky-buy">
        <h2>Order Summary</h2>
        <p>Subtotal <strong class="summary-price" data-cart-subtotal>₹0</strong></p>
        <p>Shipping charge <strong class="summary-price" data-cart-shipping>Depends on location</strong></p>
        <hr>
        <h3>Total <strong class="summary-price" data-cart-total>₹0</strong></h3>
        <a class="btn" href="checkout.html">Order on WhatsApp</a>
        <a class="btn secondary" href="track-order.html">Track My Order</a>
      </aside>
    </div>
  </main>
  <footer class="footer" data-footer></footer>
  <script src="assets/js/main.js"></script>
</body>
</html>
